apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.global.registry }}/{{ .Values.frontend.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu:    {{ .Values.frontend.resources.requests.cpu    | quote }}
              memory: {{ .Values.frontend.resources.requests.memory | quote }}
            limits:
              cpu:    {{ .Values.frontend.resources.limits.cpu    | quote }}
              memory: {{ .Values.frontend.resources.limits.memory | quote }}
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 20
