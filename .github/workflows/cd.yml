name: CD — Deploy to EKS

on:
  workflow_run:
    workflows: ["CI — Build, Scan & Push"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: paystream-cluster
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Deploy PayStream with Helm
        run: |
          helm upgrade --install paystream ./helm/paystream \
            --namespace paystream \
            --create-namespace \
            --set global.registry=$ECR_REGISTRY \
            --set global.imageTag=${{ github.event.workflow_run.head_sha }} \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n paystream
          kubectl get svc  -n paystream
          kubectl get ingress -n paystream
